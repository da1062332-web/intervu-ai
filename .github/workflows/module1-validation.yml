name: Module 1 Validation CI

on:
  push:
    branches:
      - main
      - beta
  pull_request:
    branches:
      - main
      - beta

jobs:
  validate-module1:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/intervu"
      REDIS_URL: "redis://localhost:6379"
      JWT_SECRET: "super-secret-test-jwt-key-1234567890"
      JWT_REFRESH_SECRET: "super-secret-test-jwt-refresh-key-1234567890"
      OPENAI_API_KEY: "sk-test-dummy-key-for-ci-pipeline"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intervu
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Push Prisma Schema
        run: npx prisma db push --schema=packages/database/prisma/schema.prisma

      - name: Seed Database
        run: npx prisma db seed

      - name: Run Build
        run: npm run build

      - name: Run Unit & Integration Tests
        run: |
          npm run test
          npm run test:integration

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start Dev Servers
        run: |
          npm run dev &
          echo "Waiting for servers to start..."
          sleep 15

      - name: Run Playwright E2E Tests
        run: npx playwright test tests/e2e/module1/
