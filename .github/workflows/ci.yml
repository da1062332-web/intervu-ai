name: InterVu AI CI

on:
  push:
    branches:
      - main
      - beta

  pull_request:
    branches:
      - main
      - beta

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/intervu"
      REDIS_URL: "redis://localhost:6379"
      JWT_SECRET: "super-secret-test-jwt-key-1234567890"
      JWT_REFRESH_SECRET: "super-secret-test-jwt-refresh-key-1234567890"

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Auto-Fix Formatting
        run: npm run format

      - name: Auto-Fix Lint Issues
        run: npm run lint:fix

      - name: Check for Changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Re-Run Lint (Verification)
        run: npm run lint

      - name: Check Structure
        run: npm run check:structure

      - name: Run Type Check
        run: npm run type-check

      - name: Run Build
        run: npm run build

      - name: Run Tests
        run: npm run test

      - name: Run Integration Tests
        run: npm run test:integration

      - name: Run Contract Tests
        run: npm run test:contracts

      - name: Run Regression Tests
        run: npm run test:regression

      - name: Auto-Commit Fixes
        if: steps.git-check.outputs.changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(ci): auto-fix formatting and lint issues"
