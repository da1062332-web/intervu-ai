services:
  # 1. API Service (NestJS Backend)
  - type: web
    name: intervu-api
    env: node
    plan: starter
    buildCommand: npm run build --workspace @intervu-ai/api
    startCommand: npm run start --workspace @intervu-ai/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false # User will configure their Supabase DATABASE_URL
      - key: REDIS_URL
        fromService:
          type: redis
          name: intervu-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

  # 2. Worker Service (BullMQ Job Processor)
  - type: worker
    name: intervu-worker
    env: node
    plan: starter
    buildCommand: npm run build --workspace @intervu-ai/worker
    startCommand: npm run start --workspace @intervu-ai/worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # User will configure their Supabase DATABASE_URL
      - key: REDIS_URL
        fromService:
          type: redis
          name: intervu-redis
          property: connectionString
      - key: WORKER_CONCURRENCY
        value: 5
      - key: ENABLE_GENERATION_QUEUE
        value: true
      - key: ENABLE_EVALUATION_QUEUE
        value: true
      - key: ENABLE_ANALYTICS_QUEUE
        value: true

  # 3. Next.js Frontend Web Service
  - type: web
    name: intervu-web
    env: node
    plan: starter
    buildCommand: npm run build --workspace @intervu-ai/web
    startCommand: npm run start --workspace @intervu-ai/web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: intervu-api
          property: url

# 4. Managed Redis for queues and caching
redis:
  - name: intervu-redis
    plan: free
    ipAllowList: [] # empty IP allowlist permits connection from other services within Render account
